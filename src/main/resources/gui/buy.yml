  add10:
    action: add10
    slot: 16
    material: LIME_STAINED_GLASS_PANE
    displayname: '&aAdd 10'
    amount: 10

  add64:
    displayname: '&aSet to 64'
    material: LIME_STAINED_GLASS_PANE
    action: add64
    slot: 17
    amount: 64

  remove1:
    slot: 11
    action: remove1
    displayname: '&cRemove 1'
    amount: 1
    material: RED_STAINED_GLASS_PANE

  remove10:
    material: RED_STAINED_GLASS_PANE
    slot: 10
    action: remove10
    amount: 10
    displayname: '&cRemove 10'

  remove64:

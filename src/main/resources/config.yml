      slot: 17
      stack-change: 64
      material: LIME_STAINED_GLASS_PANE
    remove1:
      name: "&cRemove %amount%"
      slot: 11
      stack-change: -1
      material: RED_STAINED_GLASS_PANE
    remove10:
      name: "&cRemove %amount%"
      slot: 10
      stack-change: -10
      material: RED_STAINED_GLASS_PANE
    remove64:
      name: "&cRemove %amount%"
      slot: 9
      stack-change: -64
      material: RED_STAINED_GLASS_PANE
    item-preview:
      slot: 13
      lore:
        - "&fPrice per item: &#0bf52b%price%"
